<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A Mercury Crackers · Different from others</title>
<meta name="description" content="A Mercury Crackers - Bareilly's premium fancy crackers store. Owner S.K Agarwal. Established 2010. Different from others.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#1e40af;
    --primary-dark:#1e3a8a;
    --primary-light:#3b82f6;
    --accent:#60a5fa;
    --soft:#dbeafe;
    --bg:#ffffff;
    --bg-2:#f8fafc;
    --bg-3:#eff6ff;
    --text:#0f172a;
    --text-2:#475569;
    --text-3:#94a3b8;
    --border:#e2e8f0;
    --success:#16a34a;
    --warn:#f59e0b;
    --danger:#dc2626;
    --shadow:0 4px 14px rgba(30,64,175,.12);
    --shadow-lg:0 14px 40px rgba(30,64,175,.18);
  }
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--text);background:var(--bg);line-height:1.6;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{text-decoration:none;color:inherit}
  button{font:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font:inherit;width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;transition:.2s;background:#fff}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,64,175,.12)}

  /* Animations */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes zoomIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes kenBurns{0%{transform:scale(1)}100%{transform:scale(1.1)}}
  @keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes scrollX{from{transform:translateX(0)}to{transform:translateX(-100%)}}

  .reveal{opacity:0;transform:translateY(20px);transition:.6s ease}
  .reveal.in{opacity:1;transform:translateY(0)}

  /* Navbar */
  .nav{
    position:sticky;top:0;z-index:100;background:#fff;
    box-shadow:0 1px 0 var(--border);
  }
  .nav-bar{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1.15rem;color:var(--primary);letter-spacing:.5px}
  .brand-mark{
    width:44px;height:44px;border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--primary-light));
    display:grid;place-items:center;color:#fff;font-weight:900;font-size:.95rem;
    box-shadow:0 4px 14px rgba(30,64,175,.35);letter-spacing:.5px;
  }
  .brand small{color:var(--text-2);font-weight:500;display:block;font-size:.7rem;letter-spacing:.3px;margin-top:2px}
  .nav-links{list-style:none;display:flex;gap:6px;align-items:center}
  .nav-links a{padding:8px 14px;border-radius:8px;color:var(--text);font-weight:500;font-size:.92rem;transition:.2s}
  .nav-links a:hover,.nav-links a.active{color:var(--primary);background:var(--bg-3)}
  .nav-cta{display:flex;align-items:center;gap:10px}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
    background:var(--bg-3);color:var(--primary);transition:.2s;position:relative;
  }
  .icon-btn:hover{background:var(--primary);color:#fff;transform:translateY(-2px)}
  .icon-btn svg{width:18px;height:18px}
  .badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px;display:grid;place-items:center;font-size:.7rem;font-weight:700}
  .menu-toggle{display:none;width:40px;height:40px;border-radius:8px;background:var(--bg-3);color:var(--primary)}
  .top-strip{
    background:linear-gradient(90deg,var(--primary-dark),var(--primary),var(--primary-light));
    background-size:200% 200%;animation:gradientMove 8s ease infinite;
    color:#fff;font-size:.82rem;
    padding:8px 0;overflow:hidden;white-space:nowrap;
  }
  .top-strip span{display:inline-block;animation:scrollX 28s linear infinite;padding-left:100%;font-weight:500}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:8px;font-weight:600;transition:.2s;font-size:.95rem}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:var(--shadow)}
  .btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
  .btn-outline:hover{background:var(--primary);color:#fff;transform:translateY(-2px)}
  .btn-soft{background:var(--bg-3);color:var(--primary)}
  .btn-soft:hover{background:var(--soft)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-danger:hover{background:#b91c1c}
  .btn-success{background:var(--success);color:#fff}
  .btn-success:hover{background:#15803d}
  .btn-sm{padding:7px 14px;font-size:.85rem}

  /* Hero with Slider */
  .hero{position:relative;min-height:560px;display:flex;align-items:center;background:var(--primary-dark);overflow:hidden;color:#fff}
  .slider{position:absolute;inset:0;z-index:0}
  .slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1s}
  .slide.active{opacity:1;animation:kenBurns 7s linear forwards}
  .slide::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(30,58,138,.85) 0%,rgba(30,64,175,.7) 50%,rgba(59,130,246,.5) 100%)}
  .slider-arrow{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;backdrop-filter:blur(8px);display:grid;place-items:center;font-size:1.4rem;z-index:5;border:1px solid rgba(255,255,255,.3);transition:.2s}
  .slider-arrow:hover{background:#fff;color:var(--primary);transform:translateY(-50%) scale(1.08)}
  .slider-arrow.prev{left:20px}.slider-arrow.next{right:20px}
  .slider-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
  .slider-dot{width:10px;height:10px;border-radius:50%;border:2px solid #fff;background:transparent;cursor:pointer;transition:.2s;padding:0}
  .slider-dot.active{background:#fff;transform:scale(1.3)}
  .hero-inner{max-width:1200px;margin:0 auto;padding:80px 20px;width:100%;position:relative;z-index:2}
  .hero-tag{display:inline-block;background:rgba(255,255,255,.18);padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:600;backdrop-filter:blur(6px);margin-bottom:18px;animation:fadeInUp .6s ease}
  .hero h1{font-size:clamp(2rem,5vw,3.6rem);font-weight:800;margin-bottom:14px;line-height:1.15;animation:fadeInUp .6s ease .1s both}
  .hero p{font-size:clamp(1rem,1.6vw,1.15rem);max-width:600px;margin-bottom:28px;opacity:.95;animation:fadeInUp .6s ease .2s both}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap;animation:fadeInUp .6s ease .3s both}
  .hero .btn-primary{background:#fff;color:var(--primary)}
  .hero .btn-primary:hover{background:var(--bg-3)}
  .hero .btn-outline{background:transparent;color:#fff;border-color:#fff}
  .hero .btn-outline:hover{background:#fff;color:var(--primary)}
  .hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:50px;max-width:700px;animation:fadeInUp .6s ease .4s both}
  .hero-stat{text-align:left}
  .hero-stat strong{display:block;font-size:1.7rem;font-weight:800;color:#fff}
  .hero-stat span{font-size:.82rem;opacity:.9}

  /* Sections */
  section{padding:70px 20px}
  .container{max-width:1200px;margin:0 auto}
  .sec-head{text-align:center;margin-bottom:40px}
  .sec-tag{display:inline-block;background:var(--bg-3);color:var(--primary);padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
  .sec-head h2{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800;color:var(--text);margin-bottom:8px}
  .sec-head p{color:var(--text-2);max-width:640px;margin:0 auto}

  /* Trust badges */
  #trust{padding:36px 20px;background:linear-gradient(135deg,var(--bg-3) 0%,var(--bg-2) 100%);border-bottom:1px solid var(--border)}
  .trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;align-items:center}
  .trust-item{display:flex;gap:14px;align-items:center}
  .trust-ic{width:48px;height:48px;border-radius:12px;background:#fff;color:var(--primary);display:grid;place-items:center;flex-shrink:0;box-shadow:var(--shadow)}
  .trust-ic svg{width:22px;height:22px;fill:currentColor}
  .trust-item strong{display:block;color:var(--text);font-size:.95rem}
  .trust-item small{color:var(--text-2);font-size:.82rem}

  /* About */
  .about-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:50px;align-items:center}
  .about-img{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:5/4;box-shadow:var(--shadow-lg)}
  .about-img img{width:100%;height:100%;object-fit:cover;transition:.6s}
  .about-img:hover img{transform:scale(1.06)}
  .about-img .badge-est{
    position:absolute;bottom:18px;left:18px;background:#fff;
    padding:14px 20px;border-radius:12px;display:flex;gap:14px;align-items:center;
    box-shadow:var(--shadow);
  }
  .badge-est strong{display:block;font-size:1.6rem;color:var(--primary);font-weight:900;line-height:1}
  .badge-est small{color:var(--text-2);font-size:.78rem}
  .about-text h3{font-size:.85rem;color:var(--primary);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .about-text h2{font-size:clamp(1.6rem,2.8vw,2.2rem);font-weight:800;margin-bottom:14px;color:var(--text)}
  .about-text p{margin-bottom:14px;color:var(--text-2)}
  .about-features{margin-top:22px;display:grid;gap:12px}
  .about-feat{display:flex;gap:12px;align-items:flex-start}
  .about-feat-ic{width:32px;height:32px;border-radius:8px;background:var(--bg-3);color:var(--primary);display:grid;place-items:center;flex-shrink:0}
  .about-feat-ic svg{width:16px;height:16px;fill:currentColor}
  .about-feat strong{display:block;font-size:.95rem;color:var(--text);margin-bottom:2px}
  .about-feat span{font-size:.85rem;color:var(--text-2)}
  .about-owner{margin-top:22px;padding:16px;background:var(--bg-3);border-radius:12px;display:flex;align-items:center;gap:14px}
  .owner-ava{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;display:grid;place-items:center;font-weight:800;font-size:1.1rem}
  .about-owner strong{display:block;color:var(--text)}
  .about-owner small{color:var(--text-2);font-size:.82rem}

  /* Categories */
  #categories{background:var(--bg-2)}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:18px}
  .cat-card{background:#fff;padding:24px 16px;border-radius:14px;text-align:center;cursor:pointer;transition:.3s;border:2px solid transparent;box-shadow:var(--shadow)}
  .cat-card:hover{transform:translateY(-6px);border-color:var(--primary);box-shadow:var(--shadow-lg)}
  .cat-thumb{width:90px;height:90px;border-radius:50%;margin:0 auto 12px;background-size:cover;background-position:center;border:3px solid var(--soft);transition:.3s}
  .cat-card:hover .cat-thumb{border-color:var(--primary);transform:scale(1.06)}
  .cat-card h4{color:var(--text);font-size:1rem;margin-bottom:4px}
  .cat-card small{color:var(--text-2);font-size:.8rem}

  /* Products */
  .filter-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:30px}
  .chip{padding:7px 16px;border:1.5px solid var(--border);border-radius:20px;background:#fff;color:var(--text-2);font-weight:600;font-size:.85rem;cursor:pointer;transition:.2s}
  .chip:hover{border-color:var(--primary);color:var(--primary)}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}
  .product{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);transition:.3s;display:flex;flex-direction:column;border:1px solid var(--border)}
  .product:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
  .product-img{height:200px;overflow:hidden;position:relative;background:var(--bg-3)}
  .product-img img{width:100%;height:100%;object-fit:cover;transition:.5s}
  .product:hover .product-img img{transform:scale(1.1)}
  .product-tag{position:absolute;top:12px;left:12px;background:var(--primary);color:#fff;padding:4px 11px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.3px}
  .product-tag.sale{background:var(--danger)}
  .product-info{padding:16px;flex:1;display:flex;flex-direction:column}
  .product-info h4{font-size:1rem;margin-bottom:4px;color:var(--text)}
  .product-info .meta{font-size:.78rem;color:var(--text-3);margin-bottom:10px}
  .price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
  .new-price{color:var(--primary);font-weight:800;font-size:1.2rem}
  .old-price{color:var(--text-3);text-decoration:line-through;font-size:.85rem}
  .add-cart{background:var(--primary);color:#fff;padding:9px;border-radius:8px;font-weight:600;transition:.2s;margin-top:auto;font-size:.88rem}
  .add-cart:hover{background:var(--primary-dark)}

  /* Contact + Map */
  #contact{background:var(--bg-2)}
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px}
  .contact-info{background:#fff;padding:30px;border-radius:14px;box-shadow:var(--shadow)}
  .contact-info h3{color:var(--primary);margin-bottom:20px;font-size:1.2rem}
  .contact-row{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
  .contact-ic{width:42px;height:42px;background:var(--bg-3);color:var(--primary);border-radius:10px;display:grid;place-items:center;flex-shrink:0}
  .contact-ic svg{width:18px;height:18px;fill:currentColor}
  .contact-row strong{display:block;color:var(--text);font-size:.92rem;margin-bottom:2px}
  .contact-row span{color:var(--text-2);font-size:.88rem}
  .contact-row a{color:var(--primary);font-weight:600}
  .contact-row a:hover{text-decoration:underline}
  form.contact-form{background:#fff;padding:30px;border-radius:14px;box-shadow:var(--shadow)}
  form.contact-form h3{color:var(--primary);margin-bottom:20px;font-size:1.2rem}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text)}
  .field textarea{min-height:90px;resize:vertical}
  .map-card{border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:#fff}
  .map-head{background:linear-gradient(90deg,var(--primary),var(--primary-light));color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .map-head strong{display:block;font-size:1rem}
  .map-head small{opacity:.95;font-size:.85rem}
  .map-card iframe{width:100%;height:380px;border:0;display:block}
  .map-dir{background:#fff;color:var(--primary);padding:8px 18px;border-radius:20px;font-weight:700;font-size:.85rem;display:inline-flex;align-items:center;gap:6px}
  .map-dir:hover{background:var(--bg-3)}

  /* Footer */
  footer{background:var(--primary-dark);color:rgba(255,255,255,.85);padding:50px 20px 0}
  .footer-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:30px}
  .foot h4{color:#fff;margin-bottom:14px;font-size:1rem}
  .foot p,.foot a{color:rgba(255,255,255,.78);font-size:.88rem;display:block;margin-bottom:6px;transition:.2s}
  .foot a:hover{color:#fff;transform:translateX(4px)}
  .social-row{display:flex;gap:10px;margin-top:14px}
  .social-row a{width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:50%;display:grid;place-items:center;color:#fff;transition:.3s;margin:0}
  .social-row a svg{width:17px;height:17px;fill:currentColor}
  .social-row a:hover{background:#fff;color:var(--primary);transform:translateY(-3px)}
  .copyright{text-align:center;padding:18px 0;margin-top:30px;border-top:1px solid rgba(255,255,255,.15);font-size:.82rem;color:rgba(255,255,255,.7)}

  /* Floating buttons */
  .float-bar{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:10px;z-index:90}
  .float-btn{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:.3s;cursor:pointer}
  .float-btn svg{width:24px;height:24px;fill:currentColor}
  .float-btn:hover{transform:scale(1.12) rotate(8deg)}
  .float-btn.wa{background:#25D366}
  .float-btn.call{background:var(--primary)}
  .float-btn.top{background:var(--text);display:none}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:1000;display:none;padding:16px;backdrop-filter:blur(4px);overflow-y:auto}
  .modal.show{display:grid;place-items:center;animation:fadeIn .25s}
  .modal-card{background:#fff;border-radius:16px;width:100%;max-width:440px;padding:30px;position:relative;animation:zoomIn .3s;max-height:92vh;overflow-y:auto}
  .modal-card.wide{max-width:600px}
  .modal-x{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:var(--bg-3);display:grid;place-items:center;color:var(--text);transition:.2s}
  .modal-x:hover{background:var(--danger);color:#fff;transform:rotate(90deg)}
  .modal h2{color:var(--primary);margin-bottom:6px;font-size:1.4rem}
  .modal p.sub{color:var(--text-2);margin-bottom:22px;font-size:.92rem}
  .auth-tabs{display:flex;background:var(--bg-3);border-radius:8px;padding:4px;margin-bottom:20px}
  .auth-tabs button{flex:1;padding:9px;border-radius:6px;font-weight:600;color:var(--text-2);transition:.2s;font-size:.9rem}
  .auth-tabs button.active{background:#fff;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.05)}
  .auth-help{text-align:center;font-size:.82rem;color:var(--text-2);margin-top:14px}
  .auth-help b{color:var(--primary)}

  /* Cart */
  .cart-empty{text-align:center;padding:40px 0;color:var(--text-3)}
  .cart-empty svg{width:48px;height:48px;margin:0 auto 10px;display:block;opacity:.4}
  .cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center}
  .cart-item img{width:54px;height:54px;border-radius:8px;object-fit:cover}
  .cart-item .info{flex:1;min-width:0}
  .cart-item h5{font-size:.92rem;margin-bottom:2px;color:var(--text)}
  .cart-item small{font-size:.78rem;color:var(--text-2)}
  .qty{display:flex;align-items:center;gap:6px}
  .qty button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--primary);font-weight:700}
  .qty button:hover{background:var(--primary);color:#fff}
  .qty span{min-width:22px;text-align:center;font-weight:600;font-size:.9rem}
  .cart-total{margin-top:14px;padding-top:14px;border-top:2px solid var(--primary);display:flex;justify-content:space-between;font-size:1.1rem;font-weight:800}
  .cart-total span:last-child{color:var(--primary)}

  /* Toast */
  .toast{position:fixed;top:90px;right:20px;background:var(--success);color:#fff;padding:13px 18px;border-radius:10px;box-shadow:0 8px 22px rgba(0,0,0,.18);z-index:2000;transform:translateX(420px);transition:.3s cubic-bezier(.34,1.56,.64,1);font-weight:600;font-size:.9rem;max-width:340px}
  .toast.show{transform:translateX(0)}
  .toast.error{background:var(--danger)}
  .toast.warn{background:var(--warn)}

  /* Admin Layout */
  .admin{display:grid;grid-template-columns:240px 1fr;min-height:100vh;background:var(--bg-2)}
  .admin-side{background:var(--primary-dark);color:#fff;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .admin-brand{padding:0 22px 22px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:14px;display:flex;gap:10px;align-items:center}
  .admin-brand .brand-mark{box-shadow:none}
  .admin-brand strong{color:#fff;font-weight:800;font-size:1rem}
  .admin-brand small{color:rgba(255,255,255,.6);font-size:.7rem;display:block}
  .admin-nav{padding:0 14px;display:flex;flex-direction:column;gap:4px}
  .admin-nav button{padding:11px 14px;border-radius:8px;color:rgba(255,255,255,.75);font-weight:500;text-align:left;display:flex;align-items:center;gap:10px;font-size:.9rem;transition:.2s}
  .admin-nav button svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
  .admin-nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  .admin-nav button.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.18)}

/* ====== ANIMATION HELPERS ====== */
function shootConfetti(x,y,n){
  const colors=['#1e40af','#3b82f6','#60a5fa','#93c5fd','#FFE66D','#FFB800','#fff','#a8e6cf'];
  const shapes=['●','★','✦','■','▲','✺','✹','◆'];
  n=n||40;
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    c.style.left=(x||Math.random()*window.innerWidth)+'px';
    c.style.top=(y||-20)+'px';
    c.style.color=colors[Math.floor(Math.random()*colors.length)];
    c.style.fontSize=(12+Math.random()*16)+'px';
    const dx=(Math.random()-.5)*500;
    const dur=2+Math.random()*2;
    c.style.animation=`sparkleFall ${dur}s linear forwards`;
    c.style.transform=`translateX(${dx}px)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),dur*1000);
  }
}
function fireworkBurst(x,y,n){
  const colors=['#1e40af','#3b82f6','#60a5fa','#93c5fd','#FFE66D','#fff'];
  n=n||22;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='firework-pt';
    const angle=(Math.PI*2*i)/n;
    const speed=70+Math.random()*100;
    p.style.left=x+'px';p.style.top=y+'px';
    const c=colors[Math.floor(Math.random()*colors.length)];
    p.style.background=c;p.style.color=c;
    p.style.setProperty('--bx',Math.cos(angle)*speed+'px');
    p.style.setProperty('--by',Math.sin(angle)*speed+'px');
    const dur=.7+Math.random()*.5;
    p.style.animation=`burstOut ${dur}s cubic-bezier(0.2,0.7,0.4,1) forwards`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),dur*1000);
  }
}
function celebrate(){
  shootConfetti(null,null,80);
  fireworkBurst(window.innerWidth*.3,window.innerHeight*.4,28);
  setTimeout(()=>fireworkBurst(window.innerWidth*.7,window.innerHeight*.45,28),300);
  setTimeout(()=>fireworkBurst(window.innerWidth*.5,window.innerHeight*.35,32),600);
}

/* ====== TOAST ====== */
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t)},[onDone]);
  return <div className={"toast show "+(type||'')}>{msg}</div>;
}

/* ====== AUTH MODAL ====== */
function AuthModal({open,onClose,onLogin,toast}){
  const [tab,setTab]=useState('login');
  const [form,setForm]=useState({name:'',email:'',phone:'',password:''});
  const [err,setErr]=useState('');
  if(!open)return null;
  const submit=e=>{
    e.preventDefault();setErr('');
    if(tab==='login'){
      // check admin first
      if(form.email===ADMIN_EMAIL && form.password===ADMIN_PASS){
        const u={name:'Admin',email:form.email,role:'admin'};
        store.set('currentUser',u);onLogin(u);toast('Welcome Admin!');return;
      }
      const users=store.get('users',[]);
      const found=users.find(u=>u.email===form.email && u.password===form.password);
      if(!found){setErr('Invalid email or password');return}
      const u={...found,role:'customer'};
      store.set('currentUser',u);onLogin(u);toast('Welcome back, '+u.name+'!');
    }else{
      if(!form.name||!form.email||!form.password){setErr('Fill all required fields');return}
      const users=store.get('users',[]);
      if(users.find(u=>u.email===form.email)){setErr('Email already registered');return}
      const u={...form,role:'customer',createdAt:Date.now()};
      users.push(u);store.set('users',users);store.set('currentUser',u);
      onLogin(u);toast('Account created! Welcome '+u.name);
    }
  };
  return (
    <div className="modal show" onClick={e=>e.target.classList.contains('modal')&&onClose()}>
      <div className="modal-card">
        <button className="modal-x" onClick={onClose}>×</button>

/* ====== CART MODAL ====== */
function CartModal({open,cart,setCart,onClose,user,toast,onCheckout,phone}){
  if(!open)return null;
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const change=(id,d)=>{const n=cart.map(i=>i.id===id?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0);setCart(n)};
  const wa=()=>{
    if(!user){toast('Please login to checkout','warn');return}
    const lines=cart.map(i=>{
      let line=i.name+' × '+i.qty+' = ₹'+(i.price*i.qty);
      if(i.bundleItems && i.bundleItems.length){
        line+='\n   Includes: '+i.bundleItems.join(', ');
      }
      return line;
    }).join('\n\n');
    const txt=encodeURIComponent('Hi A Mercury Crackers, I want to order:\n\n'+lines+'\n\n────────────\nTotal: ₹'+total+'\n\nName: '+user.name+'\nPhone: '+(user.phone||'')+'\n\nPlease confirm availability & share UPI/payment details for ₹'+total+'.');
    window.open('https://wa.me/91'+phone+'?text='+txt,'_blank');
    onCheckout(total,cart.length);
    toast('Order sent on WhatsApp!');
  };
  return (
    <div className="modal show" onClick={e=>e.target.classList.contains('modal')&&onClose()}>
      <div className="modal-card">
        <button className="modal-x" onClick={onClose}>×</button>
        <h2>Your Cart</h2>
        {cart.length===0?(
          <div className="cart-empty">{I.cart}<h4>Your cart is empty</h4><small>Add some products to get started</small></div>
        ):(
          <>
            <div style={{maxHeight:'40vh',overflowY:'auto'}}>
              {cart.map(i=><div key={i.id} className="cart-item">
                <img src={i.img} alt={i.name}/>
                <div className="info"><h5>{i.name}</h5><small>₹{i.price} × {i.qty} = ₹{i.price*i.qty}</small></div>
                <div className="qty"><button onClick={()=>change(i.id,-1)}>−</button><span>{i.qty}</span><button onClick={()=>change(i.id,1)}>+</button></div>
              </div>)}
            </div>
            <div className="cart-total"><span>Total</span><span>₹{total}</span></div>
            <p style={{fontSize:'.82rem',color:'var(--text-2)',marginTop:8}}>{total>=3000?'✓ Free shipping included':'Add ₹'+(3000-total)+' more for free shipping'}</p>
            <div style={{display:'flex',gap:10,marginTop:14,flexWrap:'wrap'}}>
              <button onClick={wa} className="btn btn-success" style={{flex:1,justifyContent:'center'}}>Order on WhatsApp</button>
              <button onClick={()=>{setCart([]);toast('Cart cleared','warn')}} className="btn btn-outline">Clear</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function Hero({content}){
  const slides=[PIC.hero1,PIC.hero2,PIC.hero3,PIC.hero4,PIC.hero5];

  useEffect(()=>{
    timer.current=setInterval(()=>setIdx(i=>(i+1)%slides.length),5000);
    return()=>clearInterval(timer.current);
  },[]);
  const go=(d)=>{clearInterval(timer.current);setIdx(i=>(i+d+slides.length)%slides.length);timer.current=setInterval(()=>setIdx(i=>(i+1)%slides.length),5000)};
  return (
    <section className="hero" id="home">
      <div className="slider">
        {slides.map((s,i)=><div key={i} className={"slide"+(i===idx?' active':'')} style={{backgroundImage:`url(${s})`}}/>)}

/* ====== Helper: parse Instagram URL → {type, id} ====== */
function parseInstaUrl(input){
  if(!input)return null;
  const s=input.trim();
  // matches /p/, /reel/, /tv/ + ID
  const m=s.match(/instagram\.com\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
  if(m)return{type:m[1],id:m[2]};
  // raw ID fallback (assume reel)
  if(/^[A-Za-z0-9_-]{6,15}$/.test(s))return{type:'reel',id:s};
  return null;
}
/* ====== Detect Facebook URL → {type:'fb-reel'|'fb-video'|'fb-watch', id, url} ====== */
function parseFbUrl(input){
  if(!input)return null;
  const s=input.trim();
  if(!/facebook\.com|fb\.watch/i.test(s))return null;
  let type='fb-video',id='';
  let m=s.match(/facebook\.com\/reel\/(\d+)/i);if(m){type='fb-reel';id=m[1];return{type,id,url:s}}
  m=s.match(/facebook\.com\/watch\/?\?v=(\d+)/i);if(m){type='fb-watch';id=m[1];return{type,id,url:s}}
  m=s.match(/facebook\.com\/[^/]+\/videos\/(\d+)/i);if(m){type='fb-video';id=m[1];return{type,id,url:s}}
  m=s.match(/fb\.watch\/([A-Za-z0-9_-]+)/i);if(m){type='fb-watch';id=m[1];return{type,id,url:s}}
  // generic Facebook URL — let the embed plugin try to handle it
  return {type,id:'',url:s};
}
function fbEmbedUrl(url){
  // Detect vertical reel for proper player dimensions
  const isReel=/\/reel\//.test(url);
  const w=isReel?340:560,h=isReel?600:315;
  return 'https://www.facebook.com/plugins/video.php?href='+encodeURIComponent(url)+'&show_text=false&width='+w+'&height='+h+'&t=0&autoplay=false&allowfullscreen=true';
}
/* Unified parser — returns {platform:'instagram'|'facebook', ...} */
function parseSocialUrl(input){
  const fb=parseFbUrl(input);if(fb)return{platform:'facebook',...fb};
  const ig=parseInstaUrl(input);if(ig)return{platform:'instagram',...ig};
  return null;
}
/* ====== Parse Instagram embed code (from IG "Share > Embed") ====== */
function parseInstaEmbed(html){
  if(!html)return null;
  // Extract permalink from data-instgrm-permalink attribute
  const perm=html.match(/data-instgrm-permalink=["']([^"'?]+)/);
  const url=perm?perm[1]:null;
  // Sanitize: strip any <script> tags (we load embed.js ourselves)
  const safe=html.replace(/<script[\s\S]*?<\/script>/gi,'');
  // Confirm it has a blockquote
  if(!/<blockquote[^>]*instagram-media/i.test(safe))return null;
  return {url,html:safe};
}
/* ====== Trigger Instagram embed.js processor ====== */
function processInstaEmbeds(){
  if(window.instgrm && window.instgrm.Embeds){
    try{window.instgrm.Embeds.process()}catch(e){}
  }else if(!document.getElementById('insta-embed-js')){
    const s=document.createElement('script');
    s.id='insta-embed-js';s.async=true;s.src='https://www.instagram.com/embed.js';
    document.body.appendChild(s);
  }
}
/* ====== Component that renders official IG blockquote ====== */
function InstaEmbedHTML({html}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current){ref.current.innerHTML=html}
    // Slight delay to let DOM settle, then process
    const t=setTimeout(processInstaEmbeds,150);
    return()=>clearTimeout(t);
  },[html]);
  return <div ref={ref} className="ig-embed-host"/>;
}
function instaEmbedUrl(type,id){
  // 'p' covers posts and gets auto-redirected to reel/ if it is one.
  // /embed/captioned/ shows the caption + media inside the iframe properly
  const t=type==='reel'?'reel':type==='tv'?'tv':'p';
  return "https://www.instagram.com/"+t+"/"+id+"/embed/captioned/";
}
function instaPublicUrl(type,id){
  const t=type==='reel'?'reel':type==='tv'?'tv':'p';
  return "https://www.instagram.com/"+t+"/"+id+"/";
}

/* ====== ADMIN: INSTAGRAM REELS MANAGER ====== */
function AdminReels({reels,setReels,toast}){
  const empty={url:'',title:'',cap:'',embed:''};
  const [form,setForm]=useState(empty);
  const [editIdx,setEditIdx]=useState(-1);
  const [mode,setMode]=useState('url'); // 'url' or 'embed'
  const MAX=10;
  const save=e=>{
    e.preventDefault();
    let toSave={...form};
    if(mode==='embed'){
      const parsedE=parseInstaEmbed(form.embed);
      if(!parsedE){toast('Invalid embed code. Paste the full <blockquote class="instagram-media"...> snippet from Instagram','error');return}
      toSave.embed=parsedE.html;
      // Fill URL from embed if blank
      if(!toSave.url && parsedE.url) toSave.url=parsedE.url;
    } else {
      // Accept Instagram OR Facebook URLs in URL mode
      const parsed=parseSocialUrl(form.url);
      if(!parsed){toast('Invalid URL — paste an Instagram or Facebook link','error');return}
      // Clear embed when using URL mode (so iframe is used)
      toSave.embed='';
    }
    if(editIdx>=0){
      const n=[...reels];n[editIdx]=toSave;setReels(n);toast('Reel updated');
    }else{
      if(reels.length>=MAX){toast('Max '+MAX+' reels allowed','warn');return}
      setReels([...reels,toSave]);toast('Reel added');
    }
    setForm(empty);setEditIdx(-1);setMode('url');
  };
  const edit=(i)=>{
    const r=reels[i];
    setForm({url:r.url||'',title:r.title||'',cap:r.cap||'',embed:r.embed||''});
    setMode(r.embed?'embed':'url');
    setEditIdx(i);
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const del=(i)=>{if(confirm('Delete this reel?')){const n=[...reels];n.splice(i,1);setReels(n);toast('Reel removed','warn')}};
  const move=(i,d)=>{
    const j=i+d;if(j<0||j>=reels.length)return;
    const n=[...reels];[n[i],n[j]]=[n[j],n[i]];setReels(n);
  };
  const parsedUrl=form.url?parseSocialUrl(form.url):null;
  const parsedEmbed=form.embed?parseInstaEmbed(form.embed):null;
  return (<div>
    <h1>Reels & Videos Manager</h1>
    <p className="sub">Embed up to {MAX} Instagram posts/reels OR Facebook videos/reels on your homepage</p>

    <div className="panel" style={{background:'linear-gradient(135deg,#fef3c7,#fff)',border:'1px solid #fcd34d'}}>
      <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
        <div style={{width:38,height:38,borderRadius:50,background:'#f59e0b',color:'#fff',display:'grid',placeItems:'center',flexShrink:0,fontWeight:900}}>?</div>
        <div>
          <strong style={{color:'var(--text)',display:'block',marginBottom:4}}>How to get the Instagram embed code</strong>
          <small style={{color:'var(--text-2)',lineHeight:1.6}}>
            <b>1.</b> Open the post on Instagram (web)<br/>
            <b>2.</b> Click the <b>···</b> menu → choose <b>Embed</b><br/>
            <b>3.</b> Click <b>Copy embed code</b> → paste into "Embed Code" tab below<br/>
            <i>This shows the official Instagram preview with caption, likes, and full carousel support — better than URL mode for multi-image posts.</i>
          </small>
        </div>
      </div>
    </div>

    <div className="panel">
      <div className="panel-head">
        <h3>{editIdx>=0?'Edit Reel #'+(editIdx+1):'Add New Reel / Post / Insight'}</h3>
        <span className="pill eco">{reels.length} / {MAX} reels</span>
      </div>

      <div className="auth-tabs" style={{maxWidth:400,marginBottom:18}}>
        <button type="button" className={mode==='url'?'active':''} onClick={()=>setMode('url')}>Quick URL</button>
        <button type="button" className={mode==='embed'?'active':''} onClick={()=>setMode('embed')}>Embed Code (Official)</button>
      </div>

      <form onSubmit={save} className="editor-grid">
        {mode==='url' ? (
          <div className="field full">
            <label>Instagram or Facebook URL *</label>
            <input required value={form.url} onChange={e=>setForm({...form,url:e.target.value})} placeholder="https://www.instagram.com/p/...  or  https://www.facebook.com/reel/..."/>
            {parsedUrl && <small style={{color:'var(--success)',fontWeight:600,marginTop:6,display:'block'}}>✓ Detected: {parsedUrl.platform==='facebook'?'Facebook '+(parsedUrl.type==='fb-reel'?'Reel':parsedUrl.type==='fb-watch'?'Watch':'Video'):(parsedUrl.type==='reel'?'Instagram Reel':parsedUrl.type==='tv'?'IGTV':'Instagram Post')}{parsedUrl.id?' · ID: '+parsedUrl.id:''}</small>}
            {form.url && !parsedUrl && <small style={{color:'var(--danger)',marginTop:6,display:'block'}}>Invalid URL — paste full Instagram or Facebook link</small>}
          </div>
        ) : (
          <div className="field full">
            <label>Instagram Embed Code *</label>
            <textarea required value={form.embed} onChange={e=>setForm({...form,embed:e.target.value})} style={{minHeight:160,fontFamily:'monospace',fontSize:'.78rem'}} placeholder='<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/XXXXX/" data-instgrm-version="14" style="...">...</blockquote>'/>
            {parsedEmbed && <small style={{color:'var(--success)',fontWeight:600,marginTop:6,display:'block'}}>✓ Valid embed detected{parsedEmbed.url?' · URL: '+parsedEmbed.url:''}</small>}
            {form.embed && !parsedEmbed && <small style={{color:'var(--danger)',marginTop:6,display:'block'}}>Invalid embed code — must include &lt;blockquote class="instagram-media"&gt;</small>}
          </div>
        )}
        <div className="field"><label>Title (internal)</label><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Diwali special"/></div>
        <div className="field"><label>Caption (shown below)</label><input value={form.cap} onChange={e=>setForm({...form,cap:e.target.value})} placeholder="e.g. Latest from our store"/></div>

        {(mode==='url' && parsedUrl) && <div className="field full">
          <label>Preview</label>
          <div style={{maxWidth:380,margin:'0 auto'}}>
            <iframe src={parsedUrl.platform==='facebook'?fbEmbedUrl(parsedUrl.url):instaEmbedUrl(parsedUrl.type,parsedUrl.id)} style={{width:'100%',height:520,border:'1px solid var(--border)',borderRadius:8}} loading="lazy" allowFullScreen scrolling="no" referrerPolicy="no-referrer-when-downgrade" title="preview"/>
          </div>
        </div>}
        {(mode==='embed' && parsedEmbed) && <div className="field full">
          <label>Preview (Official Instagram embed)</label>
          <div style={{maxWidth:540,margin:'0 auto',minHeight:540,background:'#fff',padding:10,border:'1px solid var(--border)',borderRadius:8}}>
            <InstaEmbedHTML html={parsedEmbed.html}/>
          </div>
        </div>}

        <div className="full" style={{display:'flex',gap:10}}>
          <button type="submit" className="btn btn-primary">{editIdx>=0?'Update Reel':'+ Add Reel'}</button>
          {editIdx>=0 && <button type="button" className="btn btn-soft" onClick={()=>{setForm(empty);setEditIdx(-1);setMode('url')}}>Cancel</button>}
        </div>
      </form>
    </div>

    <BulkImportPanel reels={reels} setReels={setReels} max={MAX} toast={toast}/>

    <div className="panel">
      <div className="panel-head"><h3>All Reels (reorder via arrows)</h3><span className="pill bs">Top → Bottom = display order</span></div>
      {reels.length===0?<div className="empty"><h4>No reels added yet</h4><small>Paste an Instagram link or embed code above to get started</small></div>:
      <div style={{overflowX:'auto'}}><table className="dt"><thead><tr><th>#</th><th>Platform</th><th>Source</th><th>Type</th><th>ID</th><th>Title</th><th>Caption</th><th>Order</th><th>Actions</th></tr></thead><tbody>
        {reels.map((r,i)=>{
          const p=r.url?parseSocialUrl(r.url):null;
          const isEmbed=r.embed && /instagram-media/i.test(r.embed);
          const platform=p?.platform || (isEmbed?'instagram':'—');
          return <tr key={i}>
            <td><strong>{i+1}</strong></td>
            <td>{platform==='facebook'?<span className="pill" style={{background:'#1877F2',color:'#fff'}}>Facebook</span>:platform==='instagram'?<span className="pill" style={{background:'linear-gradient(135deg,#f58529,#dd2a7b,#8134af)',color:'#fff'}}>Instagram</span>:<span style={{color:'var(--text-3)'}}>—</span>}</td>
            <td>{isEmbed?<span className="pill bs">Embed</span>:<span className="pill eco">URL</span>}</td>
            <td>{p?<span className="pill eco">{p.platform==='facebook'?(p.type==='fb-reel'?'Reel':p.type==='fb-watch'?'Watch':'Video'):(p.type==='reel'?'Reel':p.type==='tv'?'IGTV':'Post')}</span>:'—'}</td>
            <td><code style={{fontSize:'.78rem',background:'var(--bg-3)',padding:'2px 6px',borderRadius:4}}>{p?.id||'—'}</code></td>
            <td>{r.title||'—'}</td>
            <td style={{maxWidth:200,fontSize:'.85rem',color:'var(--text-2)'}}>{r.cap||'—'}</td>
            <td>
              <button className="icon-action" onClick={()=>move(i,-1)} disabled={i===0} title="Move up">↑</button>
              <button className="icon-action" onClick={()=>move(i,1)} disabled={i===reels.length-1} title="Move down">↓</button>
            </td>
            <td>
              {r.url && <a className="icon-action" href={r.url} target="_blank" rel="noopener" title="View on Instagram">{I.view}</a>}
              <button className="icon-action" onClick={()=>edit(i)} title="Edit">{I.edit}</button>
              <button className="icon-action danger" onClick={()=>del(i)} title="Delete">{I.trash}</button>
            </td>
          </tr>;
        })}
      </tbody></table></div>}
    </div>
  </div>);
}

/* ====== BULK INSTAGRAM IMPORT ====== */
function BulkImportPanel({reels,setReels,max,toast}){
  const [text,setText]=useState('');
  const importAll=()=>{
    const lines=text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    if(lines.length===0){toast('Paste at least one URL','warn');return}
    const free=max-reels.length;
    if(free<=0){toast('Already at max '+max+' reels','warn');return}
    const valid=[],invalid=[];
    lines.slice(0,free).forEach(l=>{
      const p=parseSocialUrl(l);
      if(p)valid.push({url:l,title:'',cap:''});
      else invalid.push(l);
    });
    if(valid.length===0){toast('No valid URLs found','error');return}
    setReels([...reels,...valid]);
    setText('');
    toast('Imported '+valid.length+(invalid.length?' · skipped '+invalid.length:''));
  };
  return (
    <div className="panel">
      <div className="panel-head"><h3>Bulk Import (one URL per line)</h3><span className="pill bs">Up to {max-reels.length} more</span></div>
      <textarea value={text} onChange={e=>setText(e.target.value)} style={{minHeight:120,fontFamily:'monospace',fontSize:'.82rem'}} placeholder="https://www.instagram.com/p/AAAA/&#10;https://www.instagram.com/reel/BBBB/&#10;https://www.facebook.com/reel/822439170312708&#10;https://fb.watch/CCCC/"/>
      <small style={{display:'block',marginTop:8,color:'var(--text-2)',fontSize:'.82rem'}}>Supports Instagram (/p/, /reel/, /tv/) and Facebook (/reel/, /watch?v=, /videos/, fb.watch) URLs</small>
      <div style={{marginTop:12,display:'flex',gap:10}}>
        <button className="btn btn-primary" onClick={importAll}>Import All</button>
        <button className="btn btn-soft" onClick={()=>setText('')}>Clear</button>
      </div>
    </div>
  );
}

/* ====== ADMIN: THEME / SETTINGS ====== */
function AdminTheme({content,setContent,toast}){
  const themes=[
    {name:'Royal Blue',primary:'#1e40af',light:'#3b82f6',dark:'#1e3a8a'},
    {name:'Ocean Cyan',primary:'#0891b2',light:'#06b6d4',dark:'#155e75'},
    {name:'Festive Red',primary:'#dc2626',light:'#ef4444',dark:'#991b1b'},
    {name:'Diwali Gold',primary:'#d97706',light:'#f59e0b',dark:'#92400e'},
    {name:'Forest Green',primary:'#15803d',light:'#16a34a',dark:'#14532d'},
    {name:'Royal Purple',primary:'#7c3aed',light:'#a855f7',dark:'#5b21b6'}
  ];
  const apply=(t)=>{
    document.documentElement.style.setProperty('--primary',t.primary);
    document.documentElement.style.setProperty('--primary-light',t.light);
    document.documentElement.style.setProperty('--primary-dark',t.dark);
    store.set('theme',t);
    toast('Theme applied — '+t.name);
  };
  const exportData=()=>{
    const data={content,products:store.get('products',[]),reels:store.get('reels',[]),orders:store.get('orders',[]),enquiries:store.get('enquiries',[]),users:store.get('users',[]),analytics:store.get('analytics',{}),theme:store.get('theme',null),exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='mercury-crackers-backup-'+new Date().toISOString().split('T')[0]+'.json';
    a.click();URL.revokeObjectURL(url);
    toast('Backup downloaded');
  };
  const importData=(ev)=>{
    const file=ev.target.files?.[0];if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(d.content)store.set('content',d.content);
        if(d.products)store.set('products',d.products);
        if(d.reels)store.set('reels',d.reels);
        if(d.orders)store.set('orders',d.orders);
        if(d.enquiries)store.set('enquiries',d.enquiries);
        if(d.users)store.set('users',d.users);
        if(d.analytics)store.set('analytics',d.analytics);
        toast('Data imported — refreshing…');
        setTimeout(()=>location.reload(),1200);
      }catch(err){toast('Invalid backup file','error')}
    };
    r.readAsText(file);
  };
  const reset=()=>{
    if(confirm('Clear ALL data (products, content, reels, orders, customers)? This cannot be undone.')){
      ['content','products','reels','orders','enquiries','users','analytics','theme','cart','currentUser'].forEach(k=>localStorage.removeItem('mc_'+k));
      toast('All data cleared — reloading','warn');
      setTimeout(()=>location.reload(),1200);
    }
  };
  const activeName=store.get('theme',{name:'Royal Blue'})?.name;
  return (<div>
    <h1>Theme & Settings</h1>
    <p className="sub">Customize your brand color, backup or reset all data</p>

    <div className="panel">
      <div className="panel-head"><h3>Brand Color Theme</h3></div>
      <p style={{color:'var(--text-2)',fontSize:'.88rem',marginBottom:14}}>Pick a brand color — applies instantly to buttons, headers, and accents site-wide.</p>
      <div className="color-row">
        {themes.map(t=>(
          <div key={t.name} className={"color-tile"+(activeName===t.name?' active':'')} style={{background:`linear-gradient(135deg,${t.primary},${t.light})`}} onClick={()=>apply(t)}>
            {t.name}
          </div>
        ))}
      </div>
    </div>

    <div className="panel">
      <div className="panel-head"><h3>Data Backup & Restore</h3></div>
      <p style={{color:'var(--text-2)',fontSize:'.88rem',marginBottom:14}}>Download a JSON backup of all your products, content, reels, orders, customers and enquiries. Re-import to restore.</p>
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <button className="btn btn-primary" onClick={exportData}>↓ Download Backup</button>
        <label className="btn btn-soft" style={{cursor:'pointer'}}>
          ↑ Import Backup
          <input type="file" accept=".json" onChange={importData} style={{display:'none'}}/>
        </label>
        <button className="btn btn-danger" onClick={reset}>Reset All Data</button>
      </div>
    </div>
  </div>);
}

/* ====== ADMIN PANEL ====== */
function AdminPanel({user,onExit,onLogout,products,setProducts,content,setContent,analytics,enquiries,setEnquiries,users,setUsers,reels,setReels,orders,setOrders,toast}){
  const [tab,setTab]=useState('dashboard');
  const [open,setOpen]=useState(false);
  return (
    <div className="admin">
      <aside className={"admin-side"+(open?' open':'')}>
        <div className="admin-brand"><div className="brand-mark">AM</div><div><strong>{content.brand}</strong><small>Admin Portal</small></div></div>
        <div className="admin-nav">
          <button className={tab==='dashboard'?'active':''} onClick={()=>{setTab('dashboard');setOpen(false)}}>{I.dash} Dashboard</button>
          <button className={tab==='products'?'active':''} onClick={()=>{setTab('products');setOpen(false)}}>{I.box} Products</button>
          <button className={tab==='reels'?'active':''} onClick={()=>{setTab('reels');setOpen(false)}}>{I.ig} Reels & Videos</button>
          <button className={tab==='content'?'active':''} onClick={()=>{setTab('content');setOpen(false)}}>{I.edit} Content</button>
          <button className={tab==='customers'?'active':''} onClick={()=>{setTab('customers');setOpen(false)}}>{I.user} Customers</button>
          <button className={tab==='orders'?'active':''} onClick={()=>{setTab('orders');setOpen(false)}}>{I.cart} Orders</button>
          <button className={tab==='enquiries'?'active':''} onClick={()=>{setTab('enquiries');setOpen(false)}}>{I.msg} Enquiries</button>
          <button className={tab==='theme'?'active':''} onClick={()=>{setTab('theme');setOpen(false)}}>{I.tag} Theme & Backup</button>
          <button onClick={onExit}>{I.view} View Site</button>
        </div>
        <div className="admin-foot"><button onClick={onLogout}>{I.out} Logout ({user.name})</button></div>
      </aside>
      <main className="admin-main">
        <button className="btn btn-soft btn-sm" style={{marginBottom:14,display:'inline-flex'}} onClick={()=>setOpen(o=>!o)}>{I.menu} Menu</button>
        {tab==='dashboard' && <AdminDashboard analytics={analytics} products={products} enquiries={enquiries} users={users}/>}
        {tab==='products' && <AdminProducts products={products} setProducts={setProducts} toast={toast}/>}
        {tab==='reels' && <AdminReels reels={reels} setReels={setReels} toast={toast}/>}
        {tab==='content' && <AdminContent content={content} setContent={setContent} toast={toast}/>}
        {tab==='customers' && <AdminCustomers users={users} setUsers={setUsers} toast={toast}/>}
        {tab==='orders' && <AdminOrders orders={orders} setOrders={setOrders} toast={toast}/>}
        {tab==='enquiries' && <AdminEnquiries enquiries={enquiries} setEnquiries={setEnquiries} toast={toast}/>}
        {tab==='theme' && <AdminTheme content={content} setContent={setContent} toast={toast}/>}
      </main>
    </div>
  );
}

/* ====== APP ====== */
function App(){
  const [page,setPage]=useState('home');
  const [content,setContent]=useState(()=>store.get('content',DEFAULT_CONTENT));
  const [products,setProducts]=useState(()=>store.get('products',DEFAULT_PRODUCTS));
  const [user,setUser]=useState(()=>store.get('currentUser',null));
  const [cart,setCart]=useState(()=>store.get('cart',[]));
  const [analytics,setAnalytics]=useState(()=>store.get('analytics',{pageViews:0,cartAdds:0,orders:0,revenue:0,productViews:{},dailyVisits:{}}));
  const [enquiries,setEnquiries]=useState(()=>store.get('enquiries',[]));
  const [users,setUsers]=useState(()=>store.get('users',[]));
  const [reels,setReels]=useState(()=>store.get('reels',[
    {url:'https://www.facebook.com/reel/822439170312708',title:'Facebook Reel',cap:'Latest video on Facebook'},
    {url:'https://www.instagram.com/p/DPk4xtyErXh/',title:'Festive Cracker Collection',cap:'Latest from our store'},
    {url:'https://www.instagram.com/p/DPnJxTYklzy/',title:'Premium Sparklers',cap:'Best sellers reel'},
    {url:'https://www.instagram.com/p/DPeJNABDNc_/',title:'Diwali Special',cap:'Watch in action'}
  ]));
  const [orders,setOrders]=useState(()=>store.get('orders',[]));
  const [filter,setFilter]=useState('All');
  const [authOpen,setAuthOpen]=useState(false);
  const [cartOpen,setCartOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [showTop,setShowTop]=useState(false);

  // Persist on change
  useEffect(()=>store.set('content',content),[content]);
  useEffect(()=>store.set('products',products),[products]);
  useEffect(()=>store.set('cart',cart),[cart]);
  useEffect(()=>store.set('analytics',analytics),[analytics]);
  useEffect(()=>store.set('enquiries',enquiries),[enquiries]);
  useEffect(()=>store.set('reels',reels),[reels]);
  useEffect(()=>store.set('orders',orders),[orders]);
  useEffect(()=>{setUsers(store.get('users',[]))},[authOpen]);

  // Apply saved theme
  useEffect(()=>{
    const t=store.get('theme',null);
    if(t){
      document.documentElement.style.setProperty('--primary',t.primary);
      document.documentElement.style.setProperty('--primary-light',t.light);
      document.documentElement.style.setProperty('--primary-dark',t.dark);
    }
  },[]);

  // Track page view + preload Instagram embed.js
  useEffect(()=>{
    const today=new Date().toISOString().split('T')[0];
    setAnalytics(a=>({...a,pageViews:(a.pageViews||0)+1,dailyVisits:{...a.dailyVisits,[today]:(a.dailyVisits?.[today]||0)+1}}));
    setTimeout(()=>document.getElementById('pre')?.classList.add('hide'),700);
    setTimeout(()=>document.getElementById('pre')?.remove(),1500);
    // Preload Instagram embed.js
    if(!document.getElementById('insta-embed-js')){
      const s=document.createElement('script');
      s.id='insta-embed-js';s.async=true;s.src='https://www.instagram.com/embed.js';
      document.body.appendChild(s);
    }
    // Preload Facebook SDK for embed reliability
    if(!document.getElementById('fb-root')){
      const r=document.createElement('div');r.id='fb-root';document.body.appendChild(r);
      const s=document.createElement('script');s.id='fb-sdk-js';s.async=true;s.defer=true;s.crossOrigin='anonymous';
      s.src='https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0';
      document.body.appendChild(s);
    }
    // Welcome celebration after preloader fades
    setTimeout(celebrate,1100);
    // Periodic ambient confetti every 12s (subtle)
    const amb=setInterval(()=>{if(!document.hidden && Math.random()>.4) shootConfetti(Math.random()*window.innerWidth,-20,5)},12000);
    return()=>clearInterval(amb);
  },[]);

  // Scroll for back to top
  useEffect(()=>{const onScroll=()=>setShowTop(window.scrollY>500);window.addEventListener('scroll',onScroll);return()=>window.removeEventListener('scroll',onScroll)},[]);

  // Reveal on scroll
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{threshold:.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[page]);

  const showToast=useCallback((msg,type)=>setToast({msg,type,id:Date.now()}),[]);

  const trackView=(id)=>setAnalytics(a=>({...a,productViews:{...a.productViews,[id]:(a.productViews?.[id]||0)+1}}));

  const onAdd=(p,e)=>{
    if(p.stock===false){showToast('Out of stock','warn');return}
    const ex=cart.find(c=>c.id===p.id);
    setCart(ex?cart.map(c=>c.id===p.id?{...c,qty:c.qty+1}:c):[...cart,{...p,qty:1}]);
    setAnalytics(a=>({...a,cartAdds:(a.cartAdds||0)+1}));
    if(e?.target){
      const r=e.target.getBoundingClientRect();
      shootConfetti(r.left+r.width/2,r.top,18);
      fireworkBurst(r.left+r.width/2,r.top-30,16);
      const b=e.target,o=b.textContent;b.textContent='✓ Added!';b.style.background='var(--success)';
      setTimeout(()=>{b.textContent=o;b.style.background=''},1000);
    }
    showToast('Added "'+p.name+'" to cart');
  };
  const onCheckout=(amt,items)=>{
    setAnalytics(a=>({...a,orders:(a.orders||0)+1,revenue:(a.revenue||0)+amt}));
    const orderRecord={id:Date.now(),items:cart.map(i=>({name:i.name,qty:i.qty,price:i.price})),total:amt,user:user?.name||'Guest',phone:user?.phone||'',at:Date.now()};
    setOrders([...orders,orderRecord]);
    setCart([]);
    celebrate();
  };

  const handleEnquiry=(f)=>{setEnquiries([...enquiries,{...f,at:Date.now()}]);showToast('Enquiry sent! We\'ll contact you soon.')};

  const onLogout=()=>{store.set('currentUser',null);setUser(null);setPage('home');showToast('Logged out')};

  if(page==='admin' && user?.role==='admin'){
    return (<>
      <AdminPanel user={user} onExit={()=>setPage('home')} onLogout={onLogout} products={products} setProducts={setProducts} content={content} setContent={setContent} analytics={analytics} enquiries={enquiries} setEnquiries={setEnquiries} users={users} setUsers={setUsers} reels={reels} setReels={setReels} orders={orders} setOrders={setOrders} toast={showToast}/>
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>);
  }

  return (<>
    <Header content={content} user={user} cartCount={cart.reduce((s,i)=>s+i.qty,0)} onLogin={()=>setAuthOpen(true)} onLogout={onLogout} onCart={()=>setCartOpen(true)} onAdmin={()=>setPage('admin')} page={page} setPage={setPage}/>
    <Hero content={content}/>
    <Trust/>
    <About content={content}/>
    <BundleSection content={content} onAddBundle={(b,e)=>{
      const bundleProduct={id:b.id,name:b.name,cat:'Bundles',pack:b.short,mrp:b.mrp,price:b.price,img:b.img,tag:b.tag,bundleItems:b.items};
      onAdd(bundleProduct,e);
    }} toast={showToast}/>
    <Occasion onPick={()=>{setFilter('All');document.getElementById('products')?.scrollIntoView({behavior:'smooth'});showToast('Showing all crackers — pick a category below')}}/>
    <Categories products={products} onPick={c=>{setFilter(c);document.getElementById('products')?.scrollIntoView({behavior:'smooth'})}}/>
    <Products products={products} filter={filter} setFilter={setFilter} onAdd={onAdd} trackView={trackView}/>
    <InstagramReels content={content} reels={reels}/>
    <Contact content={content} onSubmit={handleEnquiry}/>
    <Footer content={content}/>
    <div className="float-bar">
      {showTop && <button className="float-btn top" style={{display:'grid'}} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>{I.up}</button>}
      <a className="float-btn call" href={"tel:+91"+content.phone}>{I.phone}</a>
      <a className="float-btn wa" href={"https://wa.me/91"+content.whatsapp} target="_blank" rel="noopener">{I.whatsapp}</a>
    </div>
    <AuthModal open={authOpen} onClose={()=>setAuthOpen(false)} onLogin={u=>{setUser(u);setAuthOpen(false);if(u.role==='admin')setPage('admin')}} toast={showToast}/>
    <CartModal open={cartOpen} cart={cart} setCart={setCart} onClose={()=>setCartOpen(false)} user={user} toast={showToast} onCheckout={onCheckout} phone={content.whatsapp}/>
    {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
